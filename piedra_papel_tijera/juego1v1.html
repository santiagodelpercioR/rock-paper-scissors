<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rockpaperscissors</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="">About</a></li>
    </ul>
    <h1>Piedra papel o tijera</h1>
    <img id="jugadorSeleccionadoImg1" src="" alt="Jugador seleccionado" class="jugador-seleccionado">
    <img id="jugadorSeleccionadoImg2" src="" alt="Jugador2 seleccionado" class="jugador2-seleccionado">

    <div class="seccionJugador1">
        <h2>JUGADOR1</h2>
        <p id="mensajeJugador1"></p>
    </div>
    <div>
        <button onclick="jugar('piedra')"><img src="piedra.png" id="piedra" alt="piedra"></button>
        <button onclick="jugar('papel')"><img src="papel.png" id="papel" alt="papel"></button>
        <button onclick="jugar('tijera')"><img src="tijera.png" id="tijera" alt="tijera"></button>
    </div>
    <div class="seccionJugador2">
        <h2>JUGADOR2</h2>
        <p id="mensajeJugador2"></p>
    </div>
    <div>
        <button onclick="jugar('piedra')"><img src="piedra.png" id="piedra" alt="piedra"></button>
        <button onclick="jugar('papel')"><img src="papel.png" id="papel" alt="papel"></button>
        <button onclick="jugar('tijera')"><img src="tijera.png" id="tijera" alt="tijera"></button>
    </div>
    <div class="seccionGanador">
        <h2>GANADOR</h2>
        <p id="mensajeGanador"></p>
    </div>
    <div class="ring">
        <img id="jugadorSeleccionadoImg2" src="" alt="Jugador seleccionado" class="jugador-seleccionado">
        <img id="jugadaJugador1" src="" alt="Jugada jugador" class="jugada-jugador">
        <img id="jugadaJugador2" src="" alt="Jugada de CPU">
        <img src="player2.png" width="100px">
    </div>
    <div class="return">
        <button onclick="inicio()">Cambiar de personaje</button>
    </div>
    <div>
        <p>Puntaje usuario</p>
        <p id="puntaje"></p>
    </div>
    <div>
        <p>Puntaje cpu</p>
        <p id="puntajeCpu"></p>
    </div>
    <div></div>

    <script src="script.js"></script>
    <script>
        // Verifica si hay una selección de jugador almacenada en sessionStorage
        const jugadorSeleccionado = sessionStorage.getItem('jugadorSeleccionado');
        if (jugadorSeleccionado) {
            // Establece la fuente de la primera imagen del jugador seleccionado
            const jugadorSeleccionadoImg1 = document.getElementById('jugadorSeleccionadoImg1');
            jugadorSeleccionadoImg1.src = `${jugadorSeleccionado}.png`;

            // Establece la fuente de la segunda imagen del jugador seleccionado
            const jugadorSeleccionadoImg2 = document.getElementById('jugadorSeleccionadoImg2');
            jugadorSeleccionadoImg2.src = `${jugadorSeleccionado}.png`;
        }
    </script>
</body>

</html>
